services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: realdone
      POSTGRES_USER: realdone
      POSTGRES_PASSWORD: realdone
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realdone -d realdone"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-realdone.sql:ro
