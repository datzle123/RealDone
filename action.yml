name: RealDone Behavioral Verification
description: Verify recorded web behavior against a versioned baseline
author: RealDone contributors
branding:
  icon: check-circle
  color: green

inputs:
  baseline:
    description: Path to baseline manifest
    required: false
    default: .realdone/baseline.json
  contracts:
    description: Contract file or directory
    required: false
    default: .realdone/flows
  changed-files:
    description: Newline-separated changed source files; empty runs every contract
    required: false
    default: ""
  output:
    description: CI report directory
    required: false
    default: .realdone/ci
  working-directory:
    description: Working directory relative to github.workspace
    required: false
    default: .
  install-browser:
    description: Install the selected Playwright browser and OS dependencies
    required: false
    default: "true"
  browser:
    description: Browser engine used for verification (chromium, firefox, or webkit)
    required: false
    default: chromium
  allow-host:
    description: Explicit staging hostname for mutations
    required: false
    default: ""
  postgres-config:
    description: Optional PostgreSQL adapter config path for Level 6 assertions
    required: false
    default: ""
  sqlite:
    description: Optional SQLite database file for zero-config Level 6 assertions
    required: false
    default: ""
  database-configs:
    description: Newline-separated Supabase, Firebase, or MongoDB adapter config paths
    required: false
    default: ""
  provider-configs:
    description: Newline-separated maintained provider adapter config paths
    required: false
    default: ""
  role-states:
    description: Newline-separated role=storage-state-file overrides
    required: false
    default: ""
  plugins:
    description: Newline-separated provider or Prisma/custom source plugin manifest paths
    required: false
    default: ""
  plugin-timeout:
    description: Per-plugin verification timeout in milliseconds
    required: false
    default: "5000"
  plugin-memory:
    description: Per-plugin worker memory limit in megabytes
    required: false
    default: "64"
  performance-budget:
    description: Optional verification performance budget JSON path
    required: false
    default: ""
  deep:
    description: Require persistence expectations to pass in a fresh browser context
    required: false
    default: "false"
  trace:
    description: Capture Playwright traces for verification contexts
    required: false
    default: "false"
  video:
    description: Capture browser video for verification contexts
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Build RealDone action runtime
      shell: bash
      run: |
        corepack enable
        corepack pnpm --dir "$GITHUB_ACTION_PATH" install --frozen-lockfile
        corepack pnpm --dir "$GITHUB_ACTION_PATH" build
    - name: Install selected browser
      if: inputs.install-browser == 'true'
      shell: bash
      env:
        RD_BROWSER: ${{ inputs.browser }}
      run: |
        case "$RD_BROWSER" in
          chromium|firefox|webkit) ;;
          *) echo "Unsupported RealDone browser: $RD_BROWSER" >&2; exit 2 ;;
        esac
        corepack pnpm --dir "$GITHUB_ACTION_PATH" exec playwright install --with-deps "$RD_BROWSER"
    - name: Verify behavior baseline
      shell: bash
      env:
        RD_BASELINE: ${{ inputs.baseline }}
        RD_CONTRACTS: ${{ inputs.contracts }}
        RD_CHANGED_FILES: ${{ inputs.changed-files }}
        RD_OUTPUT: ${{ inputs.output }}
        RD_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        RD_ALLOW_HOST: ${{ inputs.allow-host }}
        RD_POSTGRES_CONFIG: ${{ inputs.postgres-config }}
        RD_SQLITE: ${{ inputs.sqlite }}
        RD_DATABASE_CONFIGS: ${{ inputs.database-configs }}
        RD_PROVIDER_CONFIGS: ${{ inputs.provider-configs }}
        RD_BROWSER: ${{ inputs.browser }}
        RD_ROLE_STATES: ${{ inputs.role-states }}
        RD_PLUGINS: ${{ inputs.plugins }}
        RD_PLUGIN_TIMEOUT: ${{ inputs.plugin-timeout }}
        RD_PLUGIN_MEMORY: ${{ inputs.plugin-memory }}
        RD_PERFORMANCE_BUDGET: ${{ inputs.performance-budget }}
        RD_DEEP: ${{ inputs.deep }}
        RD_TRACE: ${{ inputs.trace }}
        RD_VIDEO: ${{ inputs.video }}
      run: |
        cd "$GITHUB_WORKSPACE/$RD_WORKING_DIRECTORY"
        args=(ci --yes --baseline "$RD_BASELINE" --contracts "$RD_CONTRACTS" --output "$RD_OUTPUT" --browser "$RD_BROWSER")
        if [[ -n "$RD_ALLOW_HOST" ]]; then args+=(--allow-host "$RD_ALLOW_HOST"); fi
        if [[ -n "$RD_POSTGRES_CONFIG" ]]; then args+=(--postgres-config "$RD_POSTGRES_CONFIG"); fi
        if [[ -n "$RD_SQLITE" ]]; then args+=(--sqlite "$RD_SQLITE"); fi
        if [[ -n "$RD_PERFORMANCE_BUDGET" ]]; then args+=(--performance-budget "$RD_PERFORMANCE_BUDGET"); fi
        if [[ "$RD_DEEP" == "true" ]]; then args+=(--deep); fi
        if [[ "$RD_TRACE" == "true" ]]; then args+=(--trace); fi
        if [[ "$RD_VIDEO" == "true" ]]; then args+=(--video); fi
        if [[ -n "$RD_PLUGIN_TIMEOUT" ]]; then args+=(--plugin-timeout "$RD_PLUGIN_TIMEOUT"); fi
        if [[ -n "$RD_PLUGIN_MEMORY" ]]; then args+=(--plugin-memory "$RD_PLUGIN_MEMORY"); fi
        while IFS= read -r role_state; do
          if [[ -n "$role_state" ]]; then args+=(--role-state "$role_state"); fi
        done <<< "$RD_ROLE_STATES"
        while IFS= read -r plugin; do
          if [[ -n "$plugin" ]]; then args+=(--plugin "$plugin"); fi
        done <<< "$RD_PLUGINS"
        while IFS= read -r database_config; do
          if [[ -n "$database_config" ]]; then args+=(--database-config "$database_config"); fi
        done <<< "$RD_DATABASE_CONFIGS"
        while IFS= read -r provider_config; do
          if [[ -n "$provider_config" ]]; then args+=(--provider-config "$provider_config"); fi
        done <<< "$RD_PROVIDER_CONFIGS"
        while IFS= read -r changed; do
          if [[ -n "$changed" ]]; then args+=(--changed-file "$changed"); fi
        done <<< "$RD_CHANGED_FILES"
        node "$GITHUB_ACTION_PATH/dist/cli.js" "${args[@]}"
