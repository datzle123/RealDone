name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      REALDONE_POSTGRES_TEST_URL: postgres://realdone:realdone@127.0.0.1:5432/realdone
      REALDONE_MONGODB_TEST_URL: mongodb://127.0.0.1:27017
      REALDONE_BROWSER_MATRIX: "1"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: realdone
          POSTGRES_USER: realdone
          POSTGRES_PASSWORD: realdone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realdone -d realdone"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm audit --audit-level high
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Run browser smoke and write release attestation
        run: pnpm smoke
        env:
          REALDONE_TYPECHECK_PASSED: "1"
          REALDONE_UNIT_TESTS_PASSED: "1"
          REALDONE_RELEASE_ATTESTATION: .realdone/release-attestation.json
      - uses: actions/upload-artifact@v7
        with:
          name: release-attestation-linux-primary
          path: .realdone/release-attestation.json
          retention-days: 14
      - run: pnpm pack --pack-destination .
      - run: pnpm smoke:package ./realdone-*.tgz

  compatibility:
    name: compatibility (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: windows-latest
            node: 20
          - os: windows-latest
            node: 22
          - os: macos-latest
            node: 20
          - os: macos-latest
            node: 22
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm exec playwright install chromium
      - name: Run browser smoke and write release attestation
        run: pnpm smoke
        env:
          REALDONE_TYPECHECK_PASSED: "1"
          REALDONE_UNIT_TESTS_PASSED: "1"
          REALDONE_RELEASE_ATTESTATION: .realdone/release-attestation.json
      - uses: actions/upload-artifact@v7
        with:
          name: release-attestation-${{ runner.os }}-node-${{ matrix.node }}
          path: .realdone/release-attestation.json
          retention-days: 14

  release-gates:
    name: normative release gates (15/15)
    needs: [check, compatibility]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          pattern: release-attestation-*
          path: .realdone/release/attestations
      - name: Validate and merge platform plus external-case evidence
        run: pnpm release:merge .realdone/release/attestations release/external-cases.json .realdone/release/release-evidence.json
      - name: Require all 15 normative gates
        run: pnpm release:gates .realdone/release/release-evidence.json .realdone/release/release-gates.json
      - name: Sign hosted release evidence provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: .realdone/release/*.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: normative-release-gates
          path: |
            .realdone/release/release-evidence.json
            .realdone/release/release-gates.json
          if-no-files-found: warn
          retention-days: 30
